<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body>
    <a-scene 
      mindar-image="imageTargetSrc: targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <img id="card" src="Heading.png" />
        <a-asset-item id="avatarModel" src="greenngine.glb" ></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <a-gltf-model 
          src="#avatarModel"
          position="0 0 0.1"
          scale="1 1 1"
          animation="property: position; to: 0 0.1 0.1; dur: 1000; loop: true; dir: alternate"
          
         animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
</a-gltf-model>

      </a-entity>
    </a-scene>
  </body>
</html>
